<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marthe Hardy's Portfolio</title>
    <style>
        body {
            background-color: #f5f5dc; /* Cream */
            color: #8B8000; /* Olive */
        }
        h1, h2, h3 {
            color: #DAA520; /* Goldenrod */
        }
        #viral-moments {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #DAA520;
            background: rgba(255, 239, 204, 0.8);
            border-radius: 8px;
        }
        .viral-gallery {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .viral-gallery img {
            max-width: 30%;
            border-radius: 8px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
    </header>
    <section id="hero">
        <h2>Your Hero Section Here</h2>
        <p>Some introductory text about yourself or your work.</p>
    </section>

    <section id="viral-moments">
        <h2>March Viral Moments</h2>
        <div class="viral-gallery">
            <img src="IMG_5588.jpeg" alt="TikTok Moment 1">
            <img src="IMG_5589.jpeg" alt="TikTok Moment 2">
            <img src="IMG_5590.jpeg" alt="TikTok Moment 3">
        </div>
    </section>

    <section id="skills">
        <h2>My Skills</h2>
        <p>Details about your skills here.</p>
    </section>
</body>
</html>
